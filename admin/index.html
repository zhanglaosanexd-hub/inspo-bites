<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inspo Bites Admin</title>
    <link rel="stylesheet" href="./local-admin.css" />
  </head>
  <body>
    <div id="local-admin-root"></div>

    <script type="module">
      const isLocal =
        location.hostname === "127.0.0.1" ||
        location.hostname === "localhost" ||
        location.hostname === "";

      if (isLocal) {
        await import("./local-admin.js");
      } else {
        document.body.classList.add("decap-admin");
        const script = document.createElement("script");
        script.src = "https://unpkg.com/decap-cms@^3.6.0/dist/decap-cms.js";
        document.body.append(script);
      }
    </script>
  </body>
</html>
