<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Inspo Bites is a curated collection of design inspiration and compact UX notes."
    />
    <title>Inspo Bites - Design & UX Collection</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas class="click-spark-canvas" id="click-spark-canvas" aria-hidden="true"></canvas>

    <div class="site-shell">
      <aside class="sidebar" aria-label="Primary">
        <a class="brand" href="./" aria-label="Inspo Bites home">
          <span class="brand-mark">IB</span>
          <span class="brand-name">Inspo Bites</span>
        </a>

        <div class="presence" aria-label="正在浏览人数">
          <span class="presence-dot"></span>
          <span><span id="online-count">28</span> 人正在浏览</span>
        </div>

        <nav class="section-nav" aria-label="Sections">
          <button class="section-link is-active" type="button" data-section="inspiration">
            <span>Inspo</span>
            <small>设计灵感</small>
          </button>
          <button class="section-link" type="button" data-section="ux-bites">
            <span>UX Bites</span>
            <small>体验切片</small>
          </button>
        </nav>

        <footer class="sidebar-footer">
          <span>Updated <time id="sidebar-updated">Jul 2026</time></span>
          <span>© 2026 Inspo Bites</span>
        </footer>
      </aside>

      <main class="content">
        <header class="page-head">
          <div>
            <p class="eyebrow" id="page-eyebrow">Curated feed</p>
            <h1 id="page-title">设计灵感</h1>
            <p id="page-description">
              Fresh visual references for product, interface, motion, brand, and web design.
            </p>
          </div>

          <div class="head-meta" aria-label="Collection metadata">
            <span id="item-count">0 items</span>
            <span id="last-updated">Last updated today</span>
          </div>
        </header>

        <div class="toolbar" aria-label="Content controls">
          <label class="search-box">
            <span class="search-icon" aria-hidden="true"></span>
            <input id="search-input" type="search" placeholder="Search collection" />
          </label>

          <div class="filter-strip" id="filter-strip" aria-label="Filters"></div>

          <div class="view-switcher" id="view-switcher" aria-label="Display mode">
            <button
              class="view-mode-button"
              type="button"
              data-view-mode="single"
              aria-label="Single card mode"
              title="Single card"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="5" y="4.5" width="14" height="10" rx="1.8"></rect>
                <path d="M7 19c0-2 1.4-3 5-3s5 1 5 3"></path>
              </svg>
            </button>
            <button
              class="view-mode-button"
              type="button"
              data-view-mode="grid"
              aria-label="Uniform card mode"
              title="Uniform cards"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="4" y="4" width="6.3" height="6.3" rx="1.5"></rect>
                <rect x="13.7" y="4" width="6.3" height="6.3" rx="1.5"></rect>
                <rect x="4" y="13.7" width="6.3" height="6.3" rx="1.5"></rect>
                <rect x="13.7" y="13.7" width="6.3" height="6.3" rx="1.5"></rect>
              </svg>
            </button>
            <button
              class="view-mode-button"
              type="button"
              data-view-mode="masonry"
              aria-label="Masonry card mode"
              title="Masonry cards"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="4" y="4" width="6.3" height="6.3" rx="1.5"></rect>
                <rect x="13.7" y="4" width="6.3" height="6.3" rx="1.5"></rect>
                <path d="M4 19.8v-3.1c0-1.9 1.3-3 3.2-3s3.1 1.1 3.1 3v3.1"></path>
                <path d="M13.7 19.8v-3.1c0-1.9 1.3-3 3.2-3s3.1 1.1 3.1 3v3.1"></path>
              </svg>
            </button>
          </div>
        </div>

        <label class="sort-box visually-hidden">
          <span class="visually-hidden">Sort</span>
          <select id="sort-select">
            <option value="recent">Recent</option>
            <option value="title">A-Z</option>
            <option value="source">Source</option>
          </select>
        </label>

        <section class="gallery" id="gallery" aria-live="polite"></section>

        <section class="empty-state" id="empty-state" hidden>
          <h2>No matches</h2>
          <p>Try another tag or search term.</p>
        </section>
      </main>
    </div>

    <div class="detail-viewer" id="detail-viewer" role="dialog" aria-modal="true" hidden>
      <aside class="detail-panel" aria-labelledby="detail-title">
        <div class="detail-controls">
          <button class="detail-icon-button" id="detail-close" type="button" aria-label="Close">
            ×
          </button>
          <div class="detail-nav">
            <button class="detail-icon-button" id="detail-prev" type="button" aria-label="Previous">
              ←
            </button>
            <button class="detail-icon-button" id="detail-next" type="button" aria-label="Next">
              →
            </button>
          </div>
        </div>

        <p class="detail-section" id="detail-section">Design</p>
        <h2 id="detail-title"></h2>
        <p class="detail-author" id="detail-author"></p>
        <p class="detail-description" id="detail-description"></p>
        <dl class="detail-meta" id="detail-meta"></dl>
        <div class="detail-tags" id="detail-tags"></div>
        <a class="detail-source-link" id="detail-source-link" target="_blank" rel="noreferrer">
          Open original
        </a>
      </aside>

      <section class="detail-stage" aria-label="Preview">
        <div class="detail-preview" id="detail-preview"></div>
      </section>
    </div>

    <script type="module" src="./script.js"></script>
  </body>
</html>
