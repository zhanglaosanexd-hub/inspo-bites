<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Inspo.design 是一个收集设计灵感与 UX 观察的精选内容库。"
    />
    <title>Inspo.design - 设计与 UX 收藏</title>
    <link rel="icon" type="image/png" href="./assets/inspo-bites-logo.png?v=20260710-presence-heartbeat" />
    <link rel="stylesheet" href="./styles.css?v=20260710-presence-heartbeat" />
  </head>
  <body>
    <canvas class="click-spark-canvas" id="click-spark-canvas" aria-hidden="true"></canvas>

    <div class="site-shell">
      <aside class="sidebar" aria-label="主导航">
        <a class="brand" href="./" aria-label="Inspo.design 首页">
          <img class="brand-logo" src="./assets/inspo-bites-logo.png" alt="" />
        </a>

        <div class="presence" aria-label="正在浏览人数">
          <span class="presence-dot"></span>
          <span><span id="online-count">13</span> 人正在浏览</span>
        </div>

        <nav class="section-nav" aria-label="内容分区">
          <button class="section-link is-active" type="button" data-section="inspiration">
            <span>Inspo</span>
            <small>设计灵感</small>
          </button>
          <button class="section-link" type="button" data-section="ux-bites">
            <span>UX Bites</span>
            <small>体验切片</small>
          </button>
        </nav>

        <footer class="sidebar-footer">
          <span id="sidebar-updated">更新于 2026年7月</span>
          <span>© 2026 Inspo.design</span>
        </footer>
      </aside>

      <main class="content">
        <header class="page-head">
          <div>
            <p class="eyebrow" id="page-eyebrow">精选内容</p>
            <h1 id="page-title">设计灵感</h1>
            <p id="page-description">
              为产品、界面、Motion、品牌和网页设计收集的新鲜视觉参考。
            </p>
          </div>

          <div class="head-meta" aria-label="内容信息">
            <span id="item-count">0 条内容</span>
            <span id="last-updated">更新于今天</span>
          </div>
        </header>

        <div class="toolbar" aria-label="内容控制">
          <label class="search-box">
            <span class="search-icon" aria-hidden="true"></span>
            <input id="search-input" type="search" placeholder="搜索内容" />
          </label>

          <div class="filter-strip" id="filter-strip" aria-label="筛选"></div>

          <div class="view-switcher" id="view-switcher" aria-label="展示模式">
            <button
              class="view-mode-button"
              type="button"
              data-view-mode="single"
              aria-label="单张展示模式"
              title="单张展示"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="5" y="4.5" width="14" height="10" rx="1.8"></rect>
                <path d="M7 19c0-2 1.4-3 5-3s5 1 5 3"></path>
              </svg>
            </button>
            <button
              class="view-mode-button"
              type="button"
              data-view-mode="grid"
              aria-label="统一卡片模式"
              title="统一卡片"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="4" y="4" width="6.3" height="6.3" rx="1.5"></rect>
                <rect x="13.7" y="4" width="6.3" height="6.3" rx="1.5"></rect>
                <rect x="4" y="13.7" width="6.3" height="6.3" rx="1.5"></rect>
                <rect x="13.7" y="13.7" width="6.3" height="6.3" rx="1.5"></rect>
              </svg>
            </button>
            <button
              class="view-mode-button"
              type="button"
              data-view-mode="masonry"
              aria-label="瀑布流卡片模式"
              title="瀑布流"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="4" y="4" width="6.3" height="6.3" rx="1.5"></rect>
                <rect x="13.7" y="4" width="6.3" height="6.3" rx="1.5"></rect>
                <path d="M4 19.8v-3.1c0-1.9 1.3-3 3.2-3s3.1 1.1 3.1 3v3.1"></path>
                <path d="M13.7 19.8v-3.1c0-1.9 1.3-3 3.2-3s3.1 1.1 3.1 3v3.1"></path>
              </svg>
            </button>
          </div>
        </div>

        <label class="sort-box visually-hidden">
          <span class="visually-hidden">排序</span>
          <select id="sort-select">
            <option value="recent">最新</option>
            <option value="title">A-Z</option>
            <option value="source">来源</option>
          </select>
        </label>

        <section class="gallery" id="gallery" aria-live="polite"></section>

        <section class="empty-state" id="empty-state" hidden>
          <h2>没有匹配结果</h2>
          <p>换个标签或关键词试试。</p>
        </section>
      </main>
    </div>

    <div class="detail-viewer" id="detail-viewer" role="dialog" aria-modal="true" hidden>
      <aside class="detail-panel" aria-labelledby="detail-title">
        <div class="detail-controls">
          <button class="detail-icon-button" id="detail-close" type="button" aria-label="关闭">
            <span class="detail-icon-glyph detail-icon-glyph--close" aria-hidden="true"></span>
          </button>
          <div class="detail-nav">
            <button class="detail-icon-button" id="detail-prev" type="button" aria-label="上一条">
              <span class="detail-icon-glyph detail-icon-glyph--arrow" aria-hidden="true">←</span>
            </button>
            <button class="detail-icon-button" id="detail-next" type="button" aria-label="下一条">
              <span class="detail-icon-glyph detail-icon-glyph--arrow" aria-hidden="true">→</span>
            </button>
          </div>
        </div>

        <p class="detail-section" id="detail-section">设计灵感</p>
        <h2 id="detail-title"></h2>
        <p class="detail-author" id="detail-author"></p>
        <p class="detail-description" id="detail-description"></p>
        <dl class="detail-meta" id="detail-meta"></dl>
        <div class="detail-tags" id="detail-tags"></div>
        <a class="detail-source-link" id="detail-source-link" target="_blank" rel="noreferrer">
          查看原文
        </a>
      </aside>

      <section class="detail-stage" aria-label="预览">
        <div class="detail-preview" id="detail-preview"></div>
      </section>
    </div>

    <script src="./data/content.js?v=20260710-presence-heartbeat"></script>
    <script type="module" src="./script.js?v=20260710-presence-heartbeat"></script>
  </body>
</html>
